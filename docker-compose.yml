services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cck
      POSTGRES_USER: cck
      POSTGRES_PASSWORD: cck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  webapp:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cck:cck@db:5432/cck
      CHROME_PATH: /usr/bin/chromium
    depends_on:
      - db

volumes:
  pgdata:
